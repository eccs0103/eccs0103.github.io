name: Update activity feed

on:
    schedule:
      - cron: '*/30 * * * *'
    workflow_dispatch:


jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        permissions:
            contents: write

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '20'
                cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Run collector script
            env:
                GOOGLE_SEARCH_ID: ${{ vars.SEARCH_ID_GOOGLE }}
                GOOGLE_API_KEY: ${{ secrets.API_KEY_GOOGLE }}

                SPECIFIC_DICTIONARY: ${{ secrets.SPECIFIC_DICTIONARY }}

                ORIGIN: ${{ vars.ORIGIN }}

                GITHUB_USERNAME: ${{ vars.USERNAME_GITHUB }}
                GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

                SPOTIFY_CLIENT_ID: ${{ vars.CLIENT_ID_SPOTIFY }}
                SPOTIFY_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_SPOTIFY }}
                SPOTIFY_TOKEN: ${{ secrets.TOKEN_SPOTIFY }}

                PINTEREST_CLIENT_ID: ${{ vars.CLIENT_ID_PINTEREST }}
                PINTEREST_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_PINTEREST }}
                PINTEREST_TOKEN: ${{ secrets.TOKEN_PINTEREST }}

                STEAM_ID: ${{ vars.ID_STEAM }}
                STEAM_API_KEY: ${{ secrets.API_KEY_STEAM }}

                STACK_OVERFLOW_ID: ${{ vars.ID_STACK_OVERFLOW }}
                STACK_OVERFLOW_API_KEY: ${{ secrets.API_KEY_STACK_OVERFLOW }}

                SOUND_CLOUD_CLIENT_ID: ${{ vars.CLIENT_ID_SOUND_CLOUD }}
                SOUND_CLOUD_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_SOUND_CLOUD }}
                SOUND_CLOUD_TOKEN: ${{ secrets.TOKEN_SOUND_CLOUD }}

                TELEGRAM_CHANNEL_ID: ${{ vars.CHANNEL_ID_TELEGRAM }}
                TELEGRAM_API_ID: ${{ secrets.API_ID_TELEGRAM }}
                TELEGRAM_API_HASH: ${{ secrets.API_HASH_TELEGRAM }}
                TELEGRAM_SESSION: ${{ secrets.SESSION_TELEGRAM }}

            run: npm run walk

          - name: Get Version
            run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

          - name: Commit and Push changes
            run: |
                git config --global user.name "github-actions[bot]"
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add .
                if [ -n "$(git status --porcelain)" ]; then
                    git commit -m "${{ env.PACKAGE_VERSION }}"
                    git pull --rebase --autostash
                    git push
                else
                    echo "No changes found."
                fi
