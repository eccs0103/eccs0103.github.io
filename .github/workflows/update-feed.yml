name: Update activity feed

on:
    schedule:
      - cron: '*/30 * * * *'
    workflow_dispatch:


jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        permissions:
            contents: write
            issues: write

        steps:
          - name: Checkout code
            uses: actions/checkout@v5

          - name: Setup Node.js
            uses: actions/setup-node@v5
            with:
                node-version: 24
                cache: 'npm'

          - name: Install dependencies
            run: npm ci

          - name: Run collector script
            env:
                GOOGLE_SEARCH_ID: ${{ vars.GOOGLE_SEARCH_ID }}
                GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

                SPECIFIC_DICTIONARY: ${{ secrets.SPECIFIC_DICTIONARY }}

                ORIGIN: ${{ vars.ORIGIN }}

                # GitHub reserves the "GITHUB_" prefix for its own secrets/variables, so a custom
                # GITHUB_USERNAME/GITHUB_TOKEN can't be created. Use GitHub's own built-in context instead.
                GITHUB_USERNAME: ${{ github.repository_owner }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITHUB_REPOSITORY: ${{ github.repository }}
                GITHUB_ISSUES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

                SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID }}
                SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
                SPOTIFY_TOKEN: ${{ secrets.SPOTIFY_TOKEN }}

                PINTEREST_CLIENT_ID: ${{ vars.PINTEREST_CLIENT_ID }}
                PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}
                PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}

                STEAM_ID: ${{ vars.STEAM_ID }}
                STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

                STACK_OVERFLOW_ID: ${{ vars.STACK_OVERFLOW_ID }}
                STACK_OVERFLOW_API_KEY: ${{ secrets.STACK_OVERFLOW_API_KEY }}

                SOUND_CLOUD_CLIENT_ID: ${{ vars.SOUND_CLOUD_CLIENT_ID }}
                SOUND_CLOUD_CLIENT_SECRET: ${{ secrets.SOUND_CLOUD_CLIENT_SECRET }}
                SOUND_CLOUD_TOKEN: ${{ secrets.SOUND_CLOUD_TOKEN }}
                SOUND_CLOUD_TOKEN_KEY: ${{ secrets.SOUND_CLOUD_TOKEN_KEY }}
                SOUND_CLOUD_USERNAME: ${{ vars.SOUND_CLOUD_USERNAME }}

                TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
                TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
                TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
                TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}

                NPM_USERNAME: ${{ vars.NPM_USERNAME }}

            run: npm run walk

          - name: Get Version
            run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

          - name: Commit and Push changes
            run: |
                git config --global user.name "github-actions[bot]"
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add .
                if [ -n "$(git status --porcelain)" ]; then
                    git commit -m "${{ env.PACKAGE_VERSION }}"
                    git pull --rebase --autostash
                    git push
                else
                    echo "No changes found."
                fi
