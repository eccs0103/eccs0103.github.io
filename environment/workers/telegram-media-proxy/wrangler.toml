name = "telegram-media-proxy"
main = "controllers/media-proxy-worker.ts"
compatibility_date = "2026-03-11"

# Secrets (deploy via `wrangler secret put`):
# TELEGRAM_API_ID
# TELEGRAM_API_HASH
# TELEGRAM_SESSION
# TELEGRAM_CHANNEL_ID

[env.development]
name = "telegram-media-proxy-dev"

# Secrets for development (deploy via `wrangler secret put --env development`):
# TELEGRAM_API_ID
# TELEGRAM_API_HASH
# TELEGRAM_SESSION
# TELEGRAM_CHANNEL_ID  (development channel ID)
