<!DOCTYPE html>
<html lang="ru" data-theme="system">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type: text/html">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Personal Webpage</title>
	<link rel="shortcut icon" href="../resources/Circuit (Transparent).png">
	<link rel="stylesheet" href="../styles/style.css">
	<link rel="stylesheet" href="../styles/themes/material.css">
	<script src="../scripts/modules.js" defer></script>
	<script src="../scripts/structure.js" defer></script>
	<script src="../scripts/feed.js" defer></script>
</head>

<body style="min-width: calc(var(--size-standart-2) * 2); max-width: 100vmin; width: fit-content; display: grid; gap: var(--size-gap); margin: auto; padding: var(--size-gap);">
	<header class="layer" style="position: relative; display: grid; grid-template: max-content 1fr / var(--size-standart-2) 1fr; gap: var(--size-gap); margin-top: calc(var(--size-standart-2) / 2); padding-left: calc(var(--size-gap) + var(--size-standart));">
		<div class="flex" style="grid-row: auto / span 2; width: 100%; aspect-ratio: 2; position: relative;">
			<div class="depth transparent flex" style="width: 100%; aspect-ratio: 1; position: absolute; bottom: 0; border-radius: 50%;">
				<a href="./feed.html" class="flex" style="width: 100%; height: 100%; border-radius: inherit;">
					<img src="../resources/Circuit.gif" alt="Avatar" class="avatar" style="height: 100%; border-radius: inherit;">
				</a>
			</div>
		</div>
		<h1 style="text-align: right;">ECCS0103</h1>
		<dfn style="text-align: right;">
			Студент, программист и редактор на <a href="https://ru.stackoverflow.com/">ru.stackoverflow.com</a>
			<hr class="depth">
			Арман Саргсян,
			<script>document.write(`${((Date.now() - 1021628400000) / 1000 / 60 / 60 / 24 / 365).toFixed(0)}`)</script> лет
		</dfn>
	</header>
	<main style="display: flex; flex-direction: column; gap: var(--size-gap);">
		<template id="post-structure">
			<article id="post-" class="layer">
				<h1 class="title"></h1>
				<time class="date"></time>
				<div class="container"></div>
				<div class="tags"></div>
			</article>
		</template>
	</main>
</body>

</html>
