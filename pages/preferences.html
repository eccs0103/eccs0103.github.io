<!DOCTYPE html>
<html lang="ru" data-theme="system">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type: text/html">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Персональная страница - Предпочтения</title>
	<link rel="shortcut icon" href="../resources/Circuit (Transparent).png">
	<link rel="stylesheet" href="../styles/style.css">
	<link rel="stylesheet" href="../styles/themes/material.css">
	<script src="../scripts/modules/archive.js" defer></script>
	<script src="../scripts/modules/application.js" defer></script>
	<script src="../scripts/structure.js" defer></script>
	<script src="../scripts/preferences.js" defer></script>
</head>

<body style="display: flex; justify-content: center; gap: var(--size-gap); padding: var(--size-large-gap);">
	<main style="width: 100vmin; display: flex; flex-direction: column; gap: var(--size-gap);">
		<section class="layer">
			<h1>Вид</h1>
			<section class="option">
				<h3 class="title">Тема</h3>
				<dfn class="definition">Внешний вид страницы: цветовая гамма, задний и передний фон, шрифт.</dfn>
				<select id="dropdown-theme" class="value flex depth"></select>
			</section>
		</section>
	</main>
	<nav style="position: sticky; top: var(--size-large-gap); height: calc(100vh - 2 * var(--size-large-gap)); display: grid; grid: max-content 1fr / 1fr; gap: var(--size-gap);">
		<picture class="layer flex" style="height: calc(4 * var(--size-large-standart)); aspect-ratio: 1;">
			<img src="../resources/Circuit (Transparent).gif" alt="Avatar" class="depth avatar" style="height: 100%; border-radius: inherit;">
		</picture>
		<menu class="layer" style="display: flex; flex-direction: column;">
			<section style="display: grid; grid-template-columns: 1fr max-content; gap: var(--size-gap);" hidden>
				<input type="text" inputmode="latin" placeholder="Поиск..." class="depth" style="width: 100%;">
				<picture class="flex">
					<img src="../resources/Circuit (Transparent).png" alt="" class="icon">
				</picture>
			</section>
			<a href="./feed.html" role="combobox" style="display: grid; grid-template-columns: max-content 1fr; align-items: center; border-radius: inherit;">
				<picture class="flex" style="padding: var(--size-gap);">
					<img src="../resources/feed.png" alt="" class="icon">
				</picture>
				<span style="padding-inline: var(--size-gap);">Лента</span>
			</a>
			<a href="./information.html" role="combobox" aria-disabled="true" style="display: grid; grid-template-columns: max-content 1fr; align-items: center; border-radius: inherit;">
				<picture class="flex" style="padding: var(--size-gap);">
					<img src="../resources/information.png" alt="" class="icon">
				</picture>
				<span style="padding-inline: var(--size-gap);">Информация</span>
			</a>
			<a href="./preferences.html" role="combobox" aria-checked="true" style="display: grid; grid-template-columns: max-content 1fr; align-items: center; border-radius: inherit;">
				<picture class="flex" style="padding: var(--size-gap);">
					<img src="../resources/palette.png" alt="" class="icon">
				</picture>
				<span style="padding-inline: var(--size-gap);">Предпочтения</span>
			</a>
		</menu>
	</nav>
</body>

</html>
